workflows:
  ios-release:
    name: iOS Release (Flutter)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Replace with your App Store Connect integration name in Codemagic UI.
      app_store_connect: APP_STORE_CONNECT_INTEGRATION_NAME

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.example.bluetooth.data.presenting
      groups:
        - ios_signing

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles
      - name: CocoaPods install
        script: |
          cd ios
          pod install
          cd ..
      - name: Build IPA
        script: |
          if [ -n "$CM_EXPORT_OPTIONS_PATH" ] && [ -f "$CM_EXPORT_OPTIONS_PATH" ]; then
            flutter build ipa --release --export-options-plist "$CM_EXPORT_OPTIONS_PATH"
          else
            echo "CM_EXPORT_OPTIONS_PATH is missing. Falling back to xcode-project build-ipa."
            xcode-project build-ipa --workspace "ios/Runner.xcworkspace" --scheme "Runner"
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
